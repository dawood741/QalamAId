<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Global Styles */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #333;
}

/* Header & Navigation */
header {
    background: #fff;
    border-bottom: 1px solid #eee;
    padding: 10px 20px;
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
}


nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
    margin: 0;
    padding: 0;
}

nav ul li a {
    text-decoration: none;
    color: #333;
    font-size: 0.9rem;
}

.nav-buttons button {
    padding: 8px 15px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
    margin-left: 10px;
}

.apply-now {
    background:#00796b;
    color: #fff;
}

.donate-now {
    background:#00796b;
    color: #fff;
}

    </style>
</head>
<body>
    <header>
        <nav>
           
            <ul>
               <li><a href="index.html">Home</a></li>
               <li><a href="howitworks.html">How It Works</a></li>                
                <li><a href="about.html">About Us</a></li>                       
                <li><a href="browsestudents.html">Browse Students</a></li>
               
            </ul>
            <div class="nav-buttons">
                <button class="apply-now"onclick="location.href='Applyforscholarship.html'">Apply Now</button>
                <button class="donate-now"onclick="location.href='donatenow.html'">Donate Now</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="contact-banner">
            <h1>Contact Us</h1>
            <p>Have questions? We'd love to hear from you.</p>
        </section>

        <section class="contact-content">
            <div class="contact-form">
                <form>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name">Name *</label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject">
                    </div>
                    <div class="form-group">
                        <label for="message">Message *</label>
                        <textarea id="message" required></textarea>
                    </div>
                    <button type="submit" class="send-message">Send Message</button>
                </form>
            </div>

            <div class="contact-info">
                <h3>Get in Touch</h3>
                <p>Whether you're a student, donor, or potential partner, we're here to help.</p>
                <div class="info-item">
                    <span>Email:</span>
                    <a href="aidqalam@gmail.com">aidqalam@gmil.com</a>
                </div>
                <div class="info-item">
                    <span>Phone:</span>
                    <a href="0312-5101169">0312-5101169</a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
